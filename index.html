<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timbre Digital</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #0f172a; color: white; padding: 20px; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; max-width: 400px; margin: auto; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-bottom: 20px; }
        #lista-botones { display: grid; gap: 15px; }
        .btn { 
            display: block; width: 100%; padding: 20px; 
            font-size: 1.2rem; border: none; border-radius: 12px; 
            background: #334155; color: white; font-weight: bold; 
            cursor: pointer; transition: 0.2s;
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .msg-box { margin-top: 15px; padding: 15px; background: #111827; border-radius: 12px; border: 1px solid #38bdf8; }
        input { width: 80%; padding: 10px; border-radius: 8px; border: none; margin-bottom: 10px; }
        #status { margin-top: 20px; font-weight: bold; min-height: 20px; }
        .success { color: #4ade80; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔔 Timbre Digital</h2>
        <div id="lista-botones"><p>Cargando...</p></div>
        <div id="status"></div>
    </div>

    <script>
        async function cargarBotones() {
            const listaDiv = document.getElementById('lista-botones');
            try {
                const res = await fetch('/api/timbre');
                const deptos = await res.json();
                listaDiv.innerHTML = "";
                deptos.forEach(d => {
                    const div = document.createElement('div');
                    div.id = `cont-${d}`;
                    div.innerHTML = `<button class="btn" id="btn-${d}" onclick="tocarTimbre('${d}')">Interno ${d}</button>`;
                    listaDiv.appendChild(div);
                });
            } catch (e) { listaDiv.innerHTML = "<p>Error de conexión</p>"; }
        }

        async function tocarTimbre(depto) {
            const btn = document.getElementById(`btn-${depto}`);
            const status = document.getElementById('status');
            btn.disabled = true;
            
            try {
                const res = await fetch(`/api/timbre?depto=${depto}`);
                if (res.ok) {
                    status.className = 'success';
                    status.innerText = "✅ Timbre enviado";
                    
                    // Mostrar opción de mensaje
                    const cont = document.getElementById(`cont-${depto}`);
                    const box = document.createElement('div');
                    box.className = 'msg-box';
                    box.innerHTML = `
                        <input type="text" id="input-${depto}" placeholder="Escribir mensaje (opcional)">
                        <button class="btn" style="padding:10px; font-size:1rem; background:#0ea5e9" onclick="enviarMensaje('${depto}')">Enviar Mensaje</button>
                    `;
                    cont.appendChild(box);

                    // Timer de 30s para el botón
                    setTimeout(() => { 
                        btn.disabled = false; 
                        box.remove();
                        status.innerText = "";
                    }, 30000);
                }
            } catch (e) { status.innerText = "❌ Error"; btn.disabled = false; }
        }

        async function enviarMensaje(depto) {
            const texto = document.getElementById(`input-${depto}`).value;
            if (!texto) return;
            const status = document.getElementById('status');
            status.innerText = "Enviando mensaje...";
            
            try {
                await fetch(`/api/timbre?depto=${depto}&msg=${encodeURIComponent(texto)}`);
                status.innerText = "✅ Mensaje entregado";
                document.querySelector('.msg-box').remove();
            } catch (e) { status.innerText = "❌ Error al enviar mensaje"; }
        }

        window.onload = cargarBotones;
    </script>
</body>
</html>
