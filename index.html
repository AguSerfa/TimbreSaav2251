<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timbre Digital - Saavedra 2251</title>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background: var(--bg); color: white; padding: 20px; margin: 0; }
        .card { background: var(--card); padding: 25px; border-radius: 24px; max-width: 400px; margin: auto; border: 1px solid #334155; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); }
        
        h2 { color: var(--primary); margin-bottom: 5px; font-size: 1.8rem; }
        .aviso-demora { color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px; line-height: 1.4; }
        
        #lista-botones { display: grid; gap: 12px; margin-top: 10px; }
        .btn { 
            display: block; width: 100%; padding: 18px; font-size: 1.1rem; 
            border: none; border-radius: 16px; background: #334155; color: white; 
            font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn:hover:not(:disabled) { background: #475569; border: 1px solid var(--primary); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #respuesta-vecino {
            display: none; margin-top: 20px; padding: 20px; 
            background: #0369a1; border: 2px solid var(--primary); 
            border-radius: 18px; animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .msg-box { margin-top: 10px; padding: 12px; background: #111827; border-radius: 12px; border: 1px dashed var(--primary); }
        input { width: 85%; padding: 10px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; margin-bottom: 8px; outline: none; }
        .btn-enviar { background: var(--primary); color: #0f172a; font-size: 0.9rem; padding: 8px; width: auto; display: inline-block; }
        
        #status { margin-top: 15px; font-weight: 500; font-size: 1rem; min-height: 24px; }
        .success { color: #4ade80; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🔔 Timbre Digital</h2>
        <div class="aviso-demora">
            ⚠️ El aviso puede demorar hasta 30 segundos.<br><b>Por favor, aguarde respuesta aquí.</b>
        </div>
        
        <div id="lista-botones">
            <p style="color: #94a3b8;">Buscando internos...</p>
        </div>

        <div id="respuesta-vecino">
            <small id="nombre-interno-rta" style="text-transform: uppercase; letter-spacing: 1px; opacity: 0.8;"></small>
            <div id="texto-respuesta" style="font-size: 1.4rem; font-weight: 800; margin-top: 5px;"></div>
        </div>

        <div id="status"></div>
    </div>

    <script>
        let intervaloCheck = null;
        let timeoutLimpieza = null;

        async function cargarBotones() {
            const listaDiv = document.getElementById('lista-botones');
            try {
                const res = await fetch('/api/timbre');
                const deptos = await res.json();
                listaDiv.innerHTML = "";
                
                if (deptos.length === 0) {
                    listaDiv.innerHTML = "<p style='color:#94a3b8;'>No hay internos registrados.</p>";
                    return;
                }

                deptos.forEach(d => {
                    const div = document.createElement('div');
                    div.id = `cont-${d}`;
                    div.innerHTML = `<button class="btn" id="btn-${d}" onclick="tocarTimbre('${d}')">INTERNO ${d}</button>`;
                    listaDiv.appendChild(div);
                });
            } catch (e) { listaDiv.innerHTML = "Error de conexión"; }
        }

        async function tocarTimbre(depto) {
            const btn = document.getElementById(`btn-${depto}`);
            const status = document.getElementById('status');
            const cont = document.getElementById(`cont-${depto}`);
            
            btn.disabled = true;
            status.innerText = "Llamando al interno...";
            status.className = "";

            try {
                const res = await fetch(`/api/timbre?depto=${depto}`);
                if (res.ok) {
                    status.className = "success";
                    status.innerText = "✅ Aviso enviado. Aguarde.";

                    if (!document.getElementById(`box-${depto}`)) {
                        const box = document.createElement('div');
                        box.id = `box-${depto}`;
                        box.className = 'msg-box';
                        box.innerHTML = `
                            <input type="text" id="input-${depto}" placeholder="¿Dejar un mensaje?">
                            <button class="btn btn-enviar" onclick="enviarMensaje('${depto}')">Enviar</button>
                        `;
                        cont.appendChild(box);
                    }

                    iniciarEscucha(depto);

                    // --- CAMBIO AQUÍ: TIMER DE 30 SEGUNDOS ---
                    let segundos = 30; 
                    const originalText = btn.innerText;
                    const intervalo = setInterval(() => {
                        segundos--;
                        btn.innerText = `ESPERE ${segundos}s`;
                        if (segundos <= 0) {
                            clearInterval(intervalo);
                            clearInterval(intervaloCheck);
                            btn.disabled = false;
                            btn.innerText = originalText;
                            if (document.getElementById(`box-${depto}`)) document.getElementById(`box-${depto}`).remove();
                            status.innerText = "";
                        }
                    }, 1000);
                }
            } catch (e) { status.innerText = "Error al llamar"; btn.disabled = false; }
        }

        function iniciarEscucha(depto) {
            if (intervaloCheck) clearInterval(intervaloCheck);
            
            intervaloCheck = setInterval(async () => {
                try {
                    const res = await fetch(`/api/timbre?depto=${depto}&check=1`);
                    const data = await res.json();
                    
                    if (data.msj) {
                        const cuadro = document.getElementById('respuesta-vecino');
                        const texto = document.getElementById('texto-respuesta');
                        const label = document.getElementById('nombre-interno-rta');
                        
                        label.innerText = `Respuesta del Interno ${depto}:`;
                        texto.innerText = `"${data.msj}"`;
                        cuadro.style.display = 'block';

                        if (timeoutLimpieza) clearTimeout(timeoutLimpieza);
                        timeoutLimpieza = setTimeout(() => {
                            cuadro.style.display = 'none';
                        }, 30000);
                    }
                } catch (e) { console.error("Error buscando respuesta"); }
            }, 3000);
        }

        async function enviarMensaje(depto) {
            const input = document.getElementById(`input-${depto}`);
            const texto = input.value.trim();
            if (!texto) return;
            await fetch(`/api/timbre?depto=${depto}&msg=${encodeURIComponent(texto)}`);
            document.getElementById(`box-${depto}`).innerHTML = "<span style='color:#4ade80'>✅ Mensaje enviado</span>";
        }

        window.onload = cargarBotones;
    </script>
</body>
</html>
