<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timbre Digital - Saavedra 2251</title>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --accent: #facc15; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; text-align: center; background: var(--bg); color: white; padding: 20px; margin: 0; }
        
        .card { background: var(--card); padding: 30px 20px; border-radius: 28px; max-width: 450px; margin: auto; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        h2 { color: var(--primary); margin-bottom: 15px; font-size: 2.2rem; font-weight: 800; }
        
        /* CUADRO DE AVISO MEJORADO */
        .aviso-caja { 
            background: rgba(56, 189, 248, 0.1); 
            border: 1px solid rgba(56, 189, 248, 0.3);
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            text-align: left;
        }

        .aviso-item { 
            display: flex; 
            align-items: flex-start; 
            margin-bottom: 12px; 
            font-size: 1.1rem; 
            line-height: 1.4;
            color: #e2e8f0;
        }

        .aviso-item span { margin-right: 10px; font-size: 1.3rem; }

        .importante { 
            color: var(--accent); 
            font-weight: bold; 
            text-transform: uppercase;
            display: block;
            margin-top: 10px;
            text-align: center;
            border-top: 1px solid rgba(250, 204, 21, 0.2);
            padding-top: 10px;
        }

        #lista-botones { display: grid; gap: 15px; margin-top: 10px; }
        
        .btn { 
            display: block; width: 100%; padding: 22px; font-size: 1.3rem; 
            border: none; border-radius: 20px; background: #334155; color: white; 
            font-weight: bold; cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }
        .btn:active { transform: scale(0.96); }
        .btn:hover:not(:disabled) { background: #475569; border: 1px solid var(--primary); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        #respuesta-vecino {
            display: none; margin-top: 25px; padding: 25px; 
            background: #0369a1; border: 3px solid var(--primary); 
            border-radius: 22px; box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes bounceIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .msg-box { margin-top: 15px; padding: 15px; background: #111827; border-radius: 15px; border: 2px dashed var(--primary); }
        input { width: 80%; padding: 12px; border-radius: 12px; border: 1px solid #334155; background: #1e293b; color: white; font-size: 1rem; outline: none; }
        .btn-enviar { background: var(--primary); color: #0f172a; font-size: 1rem; padding: 10px 20px; width: auto; border-radius: 12px; font-weight: 900; margin-top: 10px; }
        
        #status { margin-top: 20px; font-weight: 600; font-size: 1.1rem; min-height: 28px; }
        .success { color: #4ade80; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🔔 Timbre Digital</h2>
        
        <div class="aviso-caja">
            <div class="aviso-item">
                <span>🕒</span> 
                <div>El aviso tarda <b>30 segundos</b> en llegar al celular del vecino.</div>
            </div>
            <div class="aviso-item">
                <span>💬</span> 
                <div>Si el vecino responde, su mensaje tardará otros <b>30 segundos</b> en aparecer aquí.</div>
            </div>
            <div class="importante">
                ⚠️ No cierres esta ventana ni salgas del navegador.
            </div>
        </div>
        
        <div id="lista-botones">
            <p style="color: #94a3b8;">Cargando internos...</p>
        </div>

        <div id="respuesta-vecino">
            <small id="nombre-interno-rta" style="text-transform: uppercase; letter-spacing: 1px; font-weight: bold; color: #bae6fd;"></small>
            <div id="texto-respuesta" style="font-size: 1.6rem; font-weight: 900; margin-top: 10px; line-height: 1.2;"></div>
        </div>

        <div id="status"></div>
    </div>

    <script>
        // ... (Aquí va el mismo script que ya teníamos en el paso anterior) ...
        // Asegurate de copiar las funciones cargarBotones, tocarTimbre, enviarMensaje e iniciarEscucha.
    </script>
</body>
</html>
