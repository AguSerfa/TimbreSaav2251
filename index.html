<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timbre Digital</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #0f172a; color: white; padding: 50px 20px; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; max-width: 400px; margin: auto; border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-bottom: 20px; }
        #lista-botones { display: grid; gap: 15px; }
        .btn { 
            display: block; width: 100%; padding: 20px; 
            font-size: 1.2rem; border: none; border-radius: 12px; 
            background: #334155; color: white; font-weight: bold; 
            cursor: pointer; transition: 0.2s; position: relative;
            overflow: hidden;
        }
        .btn:hover:not(:disabled) { background: #475569; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; background: #1e293b; border: 1px solid #334155; }
        
        /* Estilo para el texto de espera dentro del botón */
        .btn-espera { font-size: 0.8rem; display: block; color: #94a3b8; font-weight: normal; }
        
        #status { margin-top: 20px; font-weight: bold; min-height: 20px; }
        .success { color: #4ade80; }
        .error { color: #ef4444; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🔔 Timbre Digital</h2>
        <div id="lista-botones">
            <p>Cargando internos...</p>
        </div>
        <div id="status"></div>
    </div>

    <script>
        async function cargarBotones() {
            const listaDiv = document.getElementById('lista-botones');
            try {
                const res = await fetch('/api/timbre');
                const deptos = await res.json();
                listaDiv.innerHTML = "";
                
                if (deptos.length === 0) {
                    listaDiv.innerHTML = "<p>No hay internos registrados.</p>";
                    return;
                }

                deptos.forEach(d => {
                    const btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.id = `btn-${d}`;
                    btn.innerHTML = `Interno ${d}`;
                    btn.onclick = () => tocarTimbre(d, btn);
                    listaDiv.appendChild(btn);
                });
            } catch (error) {
                listaDiv.innerHTML = "<p class='error'>Error de conexión</p>";
            }
        }

        async function tocarTimbre(depto, btn) {
            const status = document.getElementById('status');
            const textoOriginal = btn.innerHTML;
            
            // Bloqueo solo ESTE botón
            btn.disabled = true;
            status.className = '';
            status.innerText = "Enviando aviso...";
            
            try {
                const res = await fetch(`/api/timbre?depto=${depto}`);
                if (res.ok) {
                    status.className = 'success';
                    status.innerText = `✅ Aviso enviado al ${depto}`;
                    
                    // Timer de 30 segundos independiente para este botón
                    let segundos = 30;
                    const intervalo = setInterval(() => {
                        segundos--;
                        btn.innerHTML = `Interno ${depto} <span class="btn-espera">Esperar ${segundos}s</span>`;
                        if (segundos <= 0) {
                            clearInterval(intervalo);
                            btn.disabled = false;
                            btn.innerHTML = textoOriginal;
                        }
                    }, 1000);

                } else {
                    throw new Error();
                }
            } catch (e) {
                status.className = 'error';
                status.innerText = "❌ Error al llamar";
                btn.disabled = false;
            }
        }

        window.onload = cargarBotones;
    </script>
</body>
</html>
