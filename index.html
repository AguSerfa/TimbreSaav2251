<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timbre Digital - Pasillo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #0f172a; color: white; padding: 20px; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; max-width: 400px; margin: auto; border: 1px solid #334155; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        h2 { color: #38bdf8; margin-bottom: 25px; font-size: 1.8rem; }
        #lista-botones { display: grid; gap: 15px; }
        
        .btn { 
            display: block; width: 100%; padding: 18px; 
            font-size: 1.2rem; border: none; border-radius: 12px; 
            background: #334155; color: white; font-weight: bold; 
            cursor: pointer; transition: 0.3s;
        }
        .btn:hover:not(:disabled) { background: #475569; border: 1px solid #38bdf8; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; background: #1e293b; border: 1px solid #334155; }

        .msg-box { 
            margin-top: 15px; padding: 15px; background: #111827; 
            border-radius: 12px; border: 1px dashed #38bdf8; 
            animation: fadeIn 0.5s;
        }
        input { 
            width: 90%; padding: 12px; border-radius: 8px; border: 1px solid #334155; 
            background: #1e293b; color: white; margin-bottom: 10px; outline: none;
        }
        input:focus { border-color: #38bdf8; }
        
        .btn-enviar { background: #0ea5e9; font-size: 1rem; padding: 10px; margin-top: 5px; }
        
        #status { margin-top: 20px; font-weight: bold; min-height: 24px; font-size: 1.1rem; }
        .success { color: #4ade80; }
        .error { color: #f87171; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="card">
        <h2>🔔 Timbre Digital</h2>
        <div id="lista-botones">
            <p>Buscando internos...</p>
        </div>
        <div id="status"></div>
    </div>

    <script>
        // 1. Cargar los botones al abrir la página
        async function cargarBotones() {
            const listaDiv = document.getElementById('lista-botones');
            try {
                const res = await fetch('/api/timbre');
                const deptos = await res.json();
                listaDiv.innerHTML = "";
                
                if (deptos.length === 0) {
                    listaDiv.innerHTML = "<p style='color: #94a3b8;'>No hay internos registrados todavía.</p>";
                    return;
                }

                deptos.forEach(d => {
                    const cont = document.createElement('div');
                    cont.id = `cont-${d}`;
                    cont.innerHTML = `<button class="btn" id="btn-${d}" onclick="tocarTimbre('${d}')">Interno ${d}</button>`;
                    listaDiv.appendChild(cont);
                });
            } catch (e) {
                listaDiv.innerHTML = "<p class='error'>Error al conectar con el servidor</p>";
            }
        }

        // 2. Acción de tocar el timbre
        async function tocarTimbre(depto) {
            const btn = document.getElementById(`btn-${depto}`);
            const status = document.getElementById('status');
            const cont = document.getElementById(`cont-${depto}`);
            
            btn.disabled = true;
            status.innerText = "Llamando...";
            status.className = "";

            try {
                const res = await fetch(`/api/timbre?depto=${depto}`);
                if (res.ok) {
                    status.className = "success";
                    status.innerText = "✅ Timbre enviado";

                    // Crear cuadro para mensaje opcional
                    if (!document.getElementById(`box-${depto}`)) {
                        const box = document.createElement('div');
                        box.id = `box-${depto}`;
                        box.className = 'msg-box';
                        box.innerHTML = `
                            <input type="text" id="input-${depto}" placeholder="¿Querés dejar un mensaje?">
                            <button class="btn btn-enviar" onclick="enviarMensaje('${depto}')">Enviar Mensaje</button>
                        `;
                        cont.appendChild(box);
                    }

                    // Bloqueo de 30 segundos
                    let segundos = 30;
                    const originalText = btn.innerText;
                    const intervalo = setInterval(() => {
                        segundos--;
                        btn.innerText = `Espera ${segundos}s`;
                        if (segundos <= 0) {
                            clearInterval(intervalo);
                            btn.disabled = false;
                            btn.innerText = originalText;
                            const box = document.getElementById(`box-${depto}`);
                            if (box) box.remove();
                            status.innerText = "";
                        }
                    }, 1000);

                } else { throw new Error(); }
            } catch (e) {
                status.className = "error";
                status.innerText = "❌ Error al enviar";
                btn.disabled = false;
            }
        }

        // 3. Enviar mensaje de texto opcional
        async function enviarMensaje(depto) {
            const input = document.getElementById(`input-${depto}`);
            const texto = input.value.trim();
            const status = document.getElementById('status');
            
            if (!texto) return;

            status.innerText = "Enviando mensaje...";
            try {
                const res = await fetch(`/api/timbre?depto=${depto}&msg=${encodeURIComponent(texto)}`);
                if (res.ok) {
                    status.innerText = "✅ Mensaje entregado";
                    document.getElementById(`box-${depto}`).remove();
                }
            } catch (e) {
                status.innerText = "❌ Error al enviar mensaje";
            }
        }

        window.onload = cargarBotones;
    </script>
</body>
</html>
