<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Pasillo</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #0f172a; color: white; padding: 50px 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; max-width: 350px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h2 { color: #38bdf8; margin-bottom: 20px; }
        .btn { 
            display: block; width: 100%; margin: 12px 0; padding: 18px; 
            font-size: 1.1rem; border: none; border-radius: 12px; 
            background: #334155; color: white; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .btn:disabled { background: #1e293b; color: #64748b; cursor: not-allowed; border: 1px solid #334155; }
        .btn:active:not(:disabled) { background: #38bdf8; transform: scale(0.96); }
        #status { margin-top: 20px; font-weight: bold; min-height: 24px; }
        .cooldown { color: #fbbf24; }
        .success { color: #4ade80; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔔 Timbre Digital</h2>
        <div id="lista-botones">
            <button class="btn" onclick="tocar('4', this)">Interno 4</button>
        </div>
        <div id="status"></div>
    </div>

    <script>
        function tocar(depto, botonPresionado) {
            const status = document.getElementById('status');
            const botones = document.querySelectorAll('.btn');
            
            botones.forEach(b => b.disabled = true);
            status.className = 'success';
            status.innerText = "Llamando...";
            
            fetch(`/api/timbre?depto=${depto}`)
            .then(() => {
                status.innerText = "✅ Enviado";
                
                let segundos = 60;
                const intervalo = setInterval(() => {
                    segundos--;
                    status.className = 'cooldown';
                    status.innerText = `Esperá ${segundos}s para reintentar`;
                    
                    if (segundos <= 0) {
                        clearInterval(intervalo);
                        status.innerText = "";
                        botones.forEach(b => b.disabled = false);
                    }
                }, 1000);
            })
            .catch(() => {
                status.innerText = "❌ Error";
                botones.forEach(b => b.disabled = false);
            });
        }
    </script>
</body>
</html>
