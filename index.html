<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Pasillo</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #0f172a; color: white; padding: 50px 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; max-width: 350px; margin: auto; }
        .btn { 
            display: block; width: 100%; margin: 12px 0; padding: 18px; 
            font-size: 1.1rem; border: none; border-radius: 12px; 
            background: #334155; color: white; font-weight: 600; cursor: pointer;
        }
        .btn:active { background: #38bdf8; }
        #status { margin-top: 20px; color: #4ade80; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔔 Timbre Digital</h2>
        <button class="btn" onclick="tocar('1A')">Departamento 1A</button>
        <button class="btn" onclick="tocar('2B')">Departamento 2B</button>
        <button class="btn" onclick="tocar('3C')">Departamento 3C</button>
        <div id="status">Enviando...</div>
    </div>
    <script>
        function tocar(depto) {
            document.getElementById('status').style.display = 'block';
            // IMPORTANTE: Solo usamos /api/timbre para que Vercel lo encuentre solito
            fetch(`/api/timbre?depto=${depto}`)
            .then(() => {
                document.getElementById('status').innerText = "✅ Enviado";
                setTimeout(() => { document.getElementById('status').style.display = 'none'; }, 3000);
            });
        }
    </script>
</body>
</html>
